  <div class="lightbox hidden" id="galleryLightbox" aria-hidden="true" role="dialog" aria-label="Galeria em tela cheia">
    <button class="lightbox-close" id="lightboxClose" aria-label="Fechar galeria">×</button>
    <button class="lightbox-nav prev" id="lightboxPrev" aria-label="Foto anterior">‹</button>
    <figure class="lightbox-figure">
      <img id="lightboxImage" alt="">
      <figcaption id="lightboxCaption"></figcaption>
    </figure>
    <button class="lightbox-nav next" id="lightboxNext" aria-label="Próxima foto">›</button>
  </div>

  <script>
    const galleryImages = Array.from(document.querySelectorAll(".gallery-grid img"));
    const lightbox = document.getElementById("galleryLightbox");
    const lightboxImage = document.getElementById("lightboxImage");
    const lightboxCaption = document.getElementById("lightboxCaption");
    const lightboxClose = document.getElementById("lightboxClose");
    const lightboxPrev = document.getElementById("lightboxPrev");
    const lightboxNext = document.getElementById("lightboxNext");

    let currentGalleryIndex = 0;

    const renderLightboxImage = () => {
      const image = galleryImages[currentGalleryIndex];
      if (!image) return;
      lightboxImage.src = image.src;
      lightboxImage.alt = image.alt;
      lightboxCaption.textContent = `${image.alt} (${currentGalleryIndex + 1}/${galleryImages.length})`;
    };

    const openLightbox = (index) => {
      currentGalleryIndex = index;
      renderLightboxImage();
      lightbox.classList.remove("hidden");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.classList.add("lightbox-open");
    };

    const closeLightbox = () => {
      lightbox.classList.add("hidden");
      lightbox.setAttribute("aria-hidden", "true");
      document.body.classList.remove("lightbox-open");
    };

    const goToPreviousImage = () => {
      currentGalleryIndex = (currentGalleryIndex - 1 + galleryImages.length) % galleryImages.length;
      renderLightboxImage();
    };

    const goToNextImage = () => {
      currentGalleryIndex = (currentGalleryIndex + 1) % galleryImages.length;
      renderLightboxImage();
    };

    galleryImages.forEach((image, index) => {
      image.addEventListener("click", () => openLightbox(index));
    });

    lightboxClose.addEventListener("click", closeLightbox);
    lightboxPrev.addEventListener("click", goToPreviousImage);
    lightboxNext.addEventListener("click", goToNextImage);

    lightbox.addEventListener("click", (event) => {
      if (event.target === lightbox) closeLightbox();
    });

    document.addEventListener("keydown", (event) => {
      if (lightbox.classList.contains("hidden")) return;
      if (event.key === "Escape") closeLightbox();
      if (event.key === "ArrowLeft") goToPreviousImage();
      if (event.key === "ArrowRight") goToNextImage();
    });
  </script>
